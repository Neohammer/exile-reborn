; OPcache est compilé en dur dans l'image officielle php:8.5-fpm (pas besoin
; de docker-php-ext-install, qui échoue sur cette extension : voir
; docs/development/technical-debt.md#opcache).
;
; Configuration développement : revalidation des fichiers à chaque requête,
; pour que les changements de code soient pris en compte sans redémarrer PHP.
; Pour la production, il faudra un conf.d/opcache.ini distinct avec
; opcache.validate_timestamps=0.

opcache.enable = 1
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
opcache.memory_consumption = 128
opcache.max_accelerated_files = 10000
