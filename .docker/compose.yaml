services:

  php:
    container_name: exile-php

    build:
      context: ./php

    volumes:
      - ../apps:/var/www/html

    working_dir: /var/www/html

    depends_on:
      - postgres
      - redis

    networks:
      - exile-network


  postgres:
    container_name: exile-postgres

    image: postgres:10

    restart: unless-stopped

    environment:
      POSTGRES_DB: exile
      POSTGRES_USER: exile
      POSTGRES_PASSWORD: exile

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

      - ./postgres/init:/docker-entrypoint-initdb.d


    networks:
      - exile-network


  redis:

    container_name: exile-redis

    image: redis:7-alpine

    restart: unless-stopped

    ports:
      - "6379:6379"

    networks:
      - exile-network


  mailpit:

    container_name: exile-mailpit

    image: axllent/mailpit

    restart: unless-stopped

    ports:
      - "8025:8025"
      - "1025:1025"

    networks:
      - exile-network


  schemaspy:

    container_name: exile-schemaspy

    image: schemaspy/schemaspy:latest

    profiles:
      - tools

    depends_on:
      - postgres

    volumes:
      - ../docs/database/generated:/output

    command:
      - -t
      - pgsql
      - -host
      - postgres
      - -port
      - "5432"
      - -db
      - exile
      - -u
      - exile
      - -p
      - exile
      - -schemas
      - public,exile_nexus,exile_s03,static

    networks:
      - exile-network


  db-docs:

    container_name: exile-db-docs

    image: nginx:alpine

    restart: unless-stopped

    volumes:
      - ../docs/database/generated:/usr/share/nginx/html:ro

    ports:
      - "8090:80"

    networks:
      - exile-network



volumes:

  postgres-data:



networks:

  exile-network:
    driver: bridge